<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teach Us To Pray // The Right Side Up</title>
<meta name="theme-color" content="#1C3D3D">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon-192.png">
<style>
:root{--teal:#1C3D3D;--cream:#F5F0E8;--ink:#121515;--muted:#716E66;--line:#B9AE9A;--bg:#153B3A;--rail:32px;--pad-x:56px;--pad-r:38px;--shadow:0 18px 40px rgba(0,0,0,.36)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 18% 8%,rgba(245,240,232,.08),transparent 28%),linear-gradient(145deg,#0e2f2e 0%,var(--bg) 48%,#0a2928 100%);font-family:Inter,Helvetica,Arial,sans-serif;color:var(--ink);display:flex;flex-direction:column;align-items:center;gap:18px;padding:22px}
.toolbar{width:min(1120px,100%);display:flex;justify-content:space-between;align-items:center;gap:14px;color:var(--cream);font-size:14px}.toolbar strong{letter-spacing:.08em}.nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap}button,.home{border:1px solid rgba(245,240,232,.86);background:transparent;color:var(--cream);padding:10px 15px;border-radius:999px;font-weight:800;cursor:pointer;text-decoration:none}button.fill{background:var(--cream);color:var(--teal)}.counter{min-width:92px;text-align:center;font-weight:900}.stage{width:min(1120px,100%);display:flex;justify-content:center}.book{width:min(90vw,980px);aspect-ratio:9/7;display:grid;grid-template-columns:1fr 1fr;gap:26px}
.page{background:var(--cream);height:100%;box-shadow:var(--shadow);position:relative;overflow:hidden;padding:38px var(--pad-r) 34px var(--pad-x)}.page.teal{background:var(--teal);color:var(--cream)}.side{position:absolute;left:0;top:0;bottom:0;width:var(--rail);border-right:1px solid var(--line)}.teal .side{border-right-color:#f5f0e855}.side span{position:absolute;writing-mode:vertical-rl;transform:rotate(180deg);left:10px;font-size:8px;letter-spacing:.16em;font-weight:900;color:var(--muted);text-transform:uppercase}.teal .side span{color:#f5f0e8a6}.side span:nth-child(1){top:28px}.side span:nth-child(2){top:210px}.side span:nth-child(3){bottom:28px}.meta,.footer{position:absolute;left:var(--pad-x);right:var(--pad-r);display:flex;justify-content:space-between;gap:16px;font-size:8px;letter-spacing:.14em;text-transform:uppercase;font-weight:900;color:var(--muted)}.meta{top:24px}.footer{bottom:23px}.teal .meta,.teal .footer{color:#f5f0e8a6}
.kicker{font-size:10px;letter-spacing:.18em;font-weight:950;text-transform:uppercase;color:var(--teal)}.teal .kicker{color:var(--cream)}.title{font-size:62px;line-height:.84;letter-spacing:-.08em;font-weight:950;text-transform:uppercase}.huge{font-size:56px;line-height:.84;letter-spacing:-.075em;font-weight:950;text-transform:uppercase}.big{font-size:42px;line-height:.88;letter-spacing:-.065em;font-weight:950;text-transform:uppercase}.body{font-size:12.8px;line-height:1.45;max-width:354px}.body.large{font-size:19px;line-height:1.18;font-weight:900;letter-spacing:-.04em}.rule{height:1px;background:var(--line);margin:16px 0}.teal .rule{background:#f5f0e866}.num{font-size:88px;line-height:.75;font-weight:950;letter-spacing:-.09em;color:var(--teal)}.teal .num{color:var(--cream)}.circle{width:106px;height:106px;border-radius:50%;background:var(--teal);position:absolute;right:42px;top:46px}.teal .circle{background:var(--cream);opacity:.95}.quote{font-family:Georgia,'Times New Roman',serif;font-size:20px;line-height:1.18;color:var(--teal)}.teal .quote{color:var(--cream)}
.prompt{border-bottom:1px solid var(--line);padding:12px 0;font-size:17px;line-height:1.16;font-weight:900;letter-spacing:-.035em}.scripture{font-family:Georgia,'Times New Roman',serif;font-size:20.5px;line-height:1.28;color:var(--teal);border-left:3px solid var(--teal);padding-left:16px;margin-top:22px}.word{border:1px solid var(--line);padding:16px;margin-top:20px}.word .greek{font-family:Georgia,'Times New Roman',serif;font-size:38px;line-height:1;color:var(--teal)}.word .pronounce{font-size:9px;letter-spacing:.16em;text-transform:uppercase;font-weight:900;color:var(--muted);margin-top:8px}
.engraving{position:absolute;inset:auto 38px 38px 56px;height:210px;opacity:.88}.engraving.top{top:64px;bottom:auto;height:230px}.engraving svg{width:100%;height:100%}.engraving path,.engraving line,.engraving circle,.engraving rect{fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}.teal .engraving{color:var(--cream);opacity:.78}.centerpiece{height:100%;display:flex;flex-direction:column;justify-content:center}
@media(max-width:760px){body{padding:12px;gap:12px}.toolbar{flex-wrap:wrap;font-size:12px}.nav{width:100%;justify-content:space-between}button,.home{padding:9px 12px}.book{grid-template-columns:1fr;width:min(95vw,430px);aspect-ratio:auto;gap:0}.page{aspect-ratio:4.5/7;box-shadow:0 12px 22px rgba(0,0,0,.28)}.right{display:none}.title{font-size:58px}.huge{font-size:51px}.big{font-size:39px}}
</style>
</head>
<body>
<div class="toolbar"><div><strong>TEACH US TO PRAY</strong> // @the.rightsideup</div><div class="nav"><a class="home" href="/">Library</a><button class="fill" onclick="prev()">← Prev</button><div class="counter" id="counter">1 / 7</div><button onclick="next()">Next →</button></div></div>
<div class="stage"><div class="book"><section class="page left teal" id="left"></section><section class="page right" id="right"></section></div></div>
<script>
function shell(inner,section='TEACH US TO PRAY',topic='LUKE 11'){return `<div class="side"><span>@THE.RIGHTSIDEUP</span><span>${section}</span><span>LUKE 11</span></div><div class="meta"><span>${section}</span><span>${topic}</span></div>${inner}<div class="footer"><span>Teach Us To Pray</span><span>@the.rightsideup</span></div>`}
function doorSVG(cls=''){return `<div class="engraving ${cls}"><svg viewBox="0 0 360 220" aria-hidden="true"><rect x="122" y="34" width="118" height="168"></rect><path d="M136 54 C166 62 198 62 226 54"></path><path d="M136 90 C166 98 198 98 226 90"></path><path d="M136 126 C166 134 198 134 226 126"></path><path d="M136 162 C166 170 198 170 226 162"></path><circle cx="218" cy="120" r="5"></circle><line x1="96" y1="202" x2="266" y2="202"></line><path d="M84 202 C104 176 116 158 122 136"></path><path d="M258 202 C246 176 242 158 240 136"></path></svg></div>`}
const pages=[
[{teal:true,html:shell(`${doorSVG('top')}<div class="circle"></div><div style="height:302px"></div><div class="title">TEACH<br>US TO<br>PRAY</div><div class="rule"></div><p class="body"><b>A Guide to Prayer from Luke 11</b><br>@THE.RIGHTSIDEUP</p>`,'COVER','A GUIDE TO PRAYER')},{html:shell(`<div class="centerpiece"><div class="kicker">Introduction</div><div class="big">They saw<br>something<br>in Jesus.</div><div class="rule"></div><p class="body">The disciples did not ask Jesus to teach them to preach, lead, or perform miracles.</p><p class="body">They watched him pray. Something in them said: <b>I want that.</b></p><p class="quote">“Lord, teach us to pray.”</p></div>`,'INTRODUCTION','LUKE 11:1')}],
[{html:shell(`<div style="height:62px"></div><div class="kicker">The Question</div><div class="huge">HOW DO<br>WE PRAY?</div><div class="rule"></div><p class="body">Jesus answers with more than a technique. He gives a pattern, a posture, and a promise.</p>`,'ORIENTATION','THE GUIDE')},{teal:true,html:shell(`<div class="centerpiece"><div class="huge">A PATTERN.<br>A POSTURE.<br>A PROMISE.</div><div class="rule"></div><p class="body large">Not a formula. A way of life with the Father.</p></div>`,'ORIENTATION','THREE MOVEMENTS')}],
[{teal:true,html:shell(`<div style="height:80px"></div><div class="num">01</div><div class="huge">THE<br>PATTERN</div><p class="body large">What do we pray?</p>`,'CHAPTER ONE','THE PATTERN')},{html:shell(`<div style="height:58px"></div><div class="kicker">Chapter 1</div><div class="big">A framework,<br>not a formula.</div><div class="rule"></div><p class="body">The Lord’s Prayer is not an incantation to conjure God’s hand. It is a pattern to pray through: each line a movement, a reorientation, a surrender.</p><div class="scripture">Father, hallowed be your name, your kingdom come.</div>`,'THE PATTERN','LUKE 11:2')}],
[{teal:true,html:shell(`<div style="height:80px"></div><div class="num">02</div><div class="huge">THE<br>POSTURE</div><p class="body large">How do we pray?</p>`,'CHAPTER TWO','THE POSTURE')},{html:shell(`<div style="height:58px"></div><div class="kicker">Chapter 2</div><div class="big">Shameless<br>audacity.</div><div class="rule"></div><p class="body">Jesus answers the question of how to pray with a story: a man pounding on his neighbor’s door at midnight because he has nothing to offer his guest.</p><p class="body"><b>A refusal to be embarrassed into silence. A refusal to quit.</b></p>`,'THE POSTURE','FRIEND AT MIDNIGHT')}],
[{html:shell(`${doorSVG()}<div style="height:54px"></div><div class="kicker">Word Study</div><div class="word"><div class="greek">ἀναίδεια</div><div class="pronounce">anaideia</div><p class="body">Shameless audacity. Bold persistence. Refusing to be embarrassed into silence. Refusing to quit.</p></div>`,'THE POSTURE','ANAIDEIA')},{html:shell(`<div style="height:64px"></div><div class="kicker">The Essential Correction</div><div class="huge">GOD IS NOT<br>THE RELUCTANT<br>NEIGHBOR.</div><div class="rule"></div><p class="body">The neighbor responds from obligation. The Father responds from love.</p>`,'THE POSTURE','CORRECTION')}],
[{teal:true,html:shell(`<div style="height:80px"></div><div class="num">03</div><div class="huge">THE<br>PROMISE</div><p class="body large">Why do we pray this way?</p>`,'CHAPTER THREE','THE PROMISE')},{html:shell(`<div style="height:58px"></div><div class="kicker">Chapter 3</div><div class="big">The Father<br>is good.</div><div class="rule"></div><p class="body">If imperfect human fathers know how to give good gifts, how much more does a perfect, loving, endlessly generous heavenly Father?</p><p class="quote">The question is not whether God will answer. It is whether I will trust the Good Father with the answer.</p>`,'THE PROMISE','THE FATHER')}],
[{html:shell(`<div style="height:62px"></div><div class="kicker">Practice Page</div><div class="big">My one<br>persistent<br>prayer.</div><div class="rule"></div><div class="prompt">What am I carrying?</div><div class="prompt">Where do I need surrender?</div><div class="prompt">Who will pray with me?</div><div class="prompt">What am I noticing?</div>`,'PRACTICE','REFLECTION')},{teal:true,html:shell(`<div style="height:118px"></div><div class="title">TEACH<br>US TO<br>PRAY</div><div class="rule"></div><p class="body"><b>@THE.RIGHTSIDEUP</b><br>A Guide to Prayer from Luke 11</p>`,'END','A GUIDE TO PRAYER')}]
];
let i=0;const left=document.getElementById('left'),right=document.getElementById('right'),counter=document.getElementById('counter');
function render(){const L=pages[i][0],R=pages[i][1];left.className='page left'+(L.teal?' teal':'');right.className='page right'+(R.teal?' teal':'');left.innerHTML=L.html;right.innerHTML=R.html;counter.textContent=`${i+1} / ${pages.length}`}
function next(){if(i<pages.length-1){i++;render()}}function prev(){if(i>0){i--;render()}}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});render();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/service-worker.js'))}
</script>
</body>
</html>
